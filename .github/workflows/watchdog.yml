name: Coding Test Watchdog

on:
  schedule:
    - cron: "0 1-14 * * *" # KST 10:00 ~ 23:00
  push:
    paths:
      - "status/*.done"
      - "journal/*.md"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get today
        id: today
        run: |
          TODAY=$(TZ=Asia/Seoul date +'%Y-%m-%d')
          echo "today=$TODAY" >> $GITHUB_OUTPUT

      - name: Check today's status
        id: check
        run: |
          TODAY=${{ steps.today.outputs.today }}

          if [ -f "status/$TODAY.done" ]; then
            echo "done=true" >> $GITHUB_OUTPUT
          else
            echo "done=false" >> $GITHUB_OUTPUT
          fi

      - name: Build success message from journal
        id: success_message
        if: github.event_name == 'push' && steps.check.outputs.done == 'true'
        run: |
          TODAY=${{ steps.today.outputs.today }}
          JOURNAL_FILE="journal/$TODAY.md"

          python3 - <<'PY'
          import os
          import json
          from pathlib import Path

          today = os.environ["TODAY"]
          journal_file = Path(os.environ["JOURNAL_FILE"])

          def extract_value(lines, prefix):
              for line in lines:
                  if line.startswith(prefix):
                      return line[len(prefix):].strip()
              return "-"

          problem = "-"
          category = "-"
          first_approach = "-"
          blocked = "-"
          result = "-"
          retry = "-"

          if journal_file.exists():
              lines = journal_file.read_text(encoding="utf-8").splitlines()
              problem = extract_value(lines, "- 문제:")
              category = extract_value(lines, "- 유형:")
              first_approach = extract_value(lines, "- 첫 접근:")
              blocked = extract_value(lines, "- 막힌 지점:")
              result = extract_value(lines, "- 결과:")
              retry = extract_value(lines, "- 내일 재풀이:")

          def shorten(text, limit=120):
              text = " ".join(text.split())
              return text if len(text) <= limit else text[:limit - 3] + "..."

          message = (
              f"🟢 오늘 코테 완료 ({today})\n"
              f"문제: {shorten(problem)}\n"
              f"유형: {shorten(category)}\n"
              f"첫 접근: {shorten(first_approach)}\n"
              f"막힌 지점: {shorten(blocked)}\n"
              f"결과: {shorten(result)}\n"
              f"내일 재풀이: {shorten(retry)}"
          )

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as f:
              f.write(f"message<<EOF\n{message}\nEOF\n")
          PY
        env:
          TODAY: ${{ steps.today.outputs.today }}
          JOURNAL_FILE: journal/${{ steps.today.outputs.today }}.md

      - name: Send success message
        if: github.event_name == 'push' && steps.check.outputs.done == 'true'
        run: |
          python3 - <<'PY'
          import os
          import json
          import urllib.request
          
          webhook_url = os.environ["DISCORD_WEBHOOK_URL"]
          message = os.environ["MESSAGE"]
          
          data = json.dumps({"content": message}).encode("utf-8")
          req = urllib.request.Request(
              webhook_url,
              data=data,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "Mozilla/5.0 (GitHubActions; CodingTestWatchdog/1.0)"
              },
              method="POST"
          )
          
          with urllib.request.urlopen(req) as resp:
              print(resp.status)
          PY
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MESSAGE: ${{ steps.success_message.outputs.message }}

      - name: Send alert
        if: github.event_name == 'schedule' && steps.check.outputs.done == 'false'
        run: |
          HOUR=$(TZ=Asia/Seoul date +'%H')
          
          if [ "$HOUR" -lt "18" ]; then
            MESSAGE="🟡 아직 코테 안했네. 지금 가볍게 시작해."
          elif [ "$HOUR" -lt "21" ]; then
            MESSAGE="🟠 슬슬 위험하다. 최소 한 문제 착수해."
          else
            MESSAGE="🔴 오늘 0일 될 위기다. 뭐라도 만들어."
          fi
          
          python3 - <<'PY'
          import os
          import json
          import urllib.request
          
          webhook_url = os.environ["DISCORD_WEBHOOK_URL"]
          message = os.environ["MESSAGE"]
          
          data = json.dumps({"content": message}).encode("utf-8")
          req = urllib.request.Request(
              webhook_url,
              data=data,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "Mozilla/5.0 (GitHubActions; CodingTestWatchdog/1.0)"
              },
              method="POST"
          )
          
          with urllib.request.urlopen(req) as resp:
              print(resp.status)
          PY
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MESSAGE: ${{ env.MESSAGE }}